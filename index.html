<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>B748 Flight Sim</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.115/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
        #cesiumContainer { width: 100%; height: 100%; position: absolute; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <script type="module">
        // 2. WAIT FOR WINDOW TO LOAD BEFORE STARTING
        window.onload = async () => {
            const { FlightWorld } = await import('./cesium.js');
            const { Boeing748 } = await import('./plane/plane.js');
            const { FlightCamera } = await import('./camera.js');

            const TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI2NzhkMDM2Zi0yOTIwLTQyOWEtYTYwYy1lY2IyYmNlMzNkZTYiLCJpZCI6NDEwODE3LCJpYXQiOjE3NzQ3OTc2NTB9.-Fwn3dLnJIdfvcJj2tiB7UHey2alHBtdRH8hCXcIqJY';
            
            try {
                const world = new FlightWorld('cesiumContainer', TOKEN);
                const my747 = new Boeing748(world.viewer);
                const camSystem = new FlightCamera(world.viewer);
                
                my747.spawn(-97.67, 30.19, 305);
                camSystem.setFollowView(my747.aircraftEntity);
                
                console.log("Systems Check: OK.");
            } catch (e) {
                console.error("Camera System Failure:", e);
            }
        };
    </script>
</body>
</html>
