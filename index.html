<script type="module">
    import { FlightWorld } from './cesium.js';
    import { Boeing748 } from './plane/plane.js';
    import { FlightCamera } from './camera.js'; // NEW IMPORT

    const TOKEN = 'YOUR_TOKEN_HERE';
    
    async function start() {
        try {
            const world = new FlightWorld('cesiumContainer', TOKEN);
            const my747 = new Boeing748(world.viewer);
            const camSystem = new FlightCamera(world.viewer); // NEW CAMERA INSTANCE
            
            // Spawn the plane
            my747.spawn(-97.67, 30.19, 305);
            
            // Lock the camera to the tail view
            camSystem.setFollowView(my747.aircraftEntity);
            
            console.log("Camera Locked: Chase View Active.");
        } catch (e) {
            console.error("Camera System Failure:", e);
        }
    }
    start();
</script>
